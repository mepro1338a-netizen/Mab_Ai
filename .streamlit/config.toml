[client]
showSidebarNavigation = false

[server]
headless = true
address = "0.0.0.0"
port = 8501
# Railway reverse proxy: XSRF with wrong origin (0.0.0.0) breaks the UI — keep off in prod.
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false
maxUploadSize = 200

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[logger]
level = "info"

[theme]
base = "dark"
primaryColor = "#7c3aed"
backgroundColor = "#09090b"
secondaryBackgroundColor = "#18181b"
textColor = "#fafafa"

[theme.sidebar]
backgroundColor = "#18181b"
secondaryBackgroundColor = "#27272a"
textColor = "#e4e4e7"
