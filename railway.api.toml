# MaByte Football AI API — second Railway service (same repo)
# Service Settings → Config file: railway.api.toml
# Start: sh start_api.sh (uvicorn on $PORT)

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh start_api.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
